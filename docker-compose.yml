version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Live-reload in local dev — remove for production builds
      - ./backend/app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty — the Nginx proxy handles /api routing internally
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_HOST: backend   # used by nginx.conf envsubst
    restart: unless-stopped

# Shared network so services can resolve each other by name
networks:
  default:
    name: card-agent-net
