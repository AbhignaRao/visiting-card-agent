server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All /api requests proxy to the backend service.
    # BACKEND_HOST is injected at container start via envsubst (see entrypoint).
    # Default falls back to the docker-compose service name.
    location /api/ {
        proxy_pass http://${BACKEND_HOST:-backend}:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        # SSE needs these settings
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # SPA fallback — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
